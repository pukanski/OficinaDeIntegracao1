<div class="min-h-screen bg-slate-50 flex items-center justify-center p-4 font-sans">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
    
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 bg-blue-600 text-white rounded-xl flex items-center justify-center text-3xl font-bold mb-4 shadow-md">
        P
      </div>
      <h1 class="text-2xl font-bold text-slate-800">Prisma</h1>
      <p class="text-sm text-slate-500 mt-1 text-center">Plataforma de inteligência de dados educacionais</p>
    </div>

    <div class="w-full">
      <label class="block text-sm font-semibold text-slate-700 mb-2">Sou...</label>
      
      <div class="flex bg-slate-100 p-1 rounded-lg mb-6">
        <button type="button" [ngClass]="perfilSelecionado === 'professor' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'" class="flex-1 py-2 text-sm font-medium rounded-md transition-all duration-200" (click)="alterarPerfil('professor')">Professor</button>
        <button type="button" [ngClass]="perfilSelecionado === 'aluno' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'" class="flex-1 py-2 text-sm font-medium rounded-md transition-all duration-200" (click)="alterarPerfil('aluno')">Aluno</button>
        <button type="button" [ngClass]="perfilSelecionado === 'admin' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'" class="flex-1 py-2 text-sm font-medium rounded-md transition-all duration-200" (click)="alterarPerfil('admin')">Admin</button>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
          <input type="email" id="email" formControlName="email" placeholder="seu@email.com" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" [ngClass]="{'border-red-500 focus:ring-red-500': loginForm.get('email')?.touched && loginForm.get('email')?.invalid}">
        </div>

        <div>
          <label for="senha" class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
          <input type="password" id="senha" formControlName="senha" placeholder="••••••••" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" [ngClass]="{'border-red-500 focus:ring-red-500': loginForm.get('senha')?.touched && loginForm.get('senha')?.invalid}">
        </div>

        <div class="flex items-center justify-between pt-2 pb-4">
          <div class="flex items-center">
            <input type="checkbox" id="lembrar" class="w-4 h-4 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500">
            <label for="lembrar" class="ml-2 text-sm text-slate-600">Lembrar de mim</label>
          </div>
          <a href="#" class="text-sm font-medium text-blue-600 hover:text-blue-500 hover:underline">Esqueci a senha</a>
        </div>

        <button type="submit" [disabled]="loginForm.invalid" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed shadow-md hover:shadow-lg">
          Entrar
        </button>
      </form>
    </div>
  </div>
</div>

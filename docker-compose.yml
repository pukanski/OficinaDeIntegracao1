services:
  api-gateway:
    build:
      context: ./backend/GatewayMicroservice
      dockerfile: Dockerfile
    ports:
      - "5050:8080"
    networks:
      - prisma-network
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8080

  aluno-api:
    build:
      context: ./backend/AlunoMicroservice
      dockerfile: Dockerfile
    #ports:
    #  - "5001:8080"
    networks:
      - prisma-network
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - Supabase__Url=${SUPABASE_URL}
      - ConnectionStrings__Supabase=${DATABASE_URL}

  professor-api:
    build:
      context: ./backend/ProfessorMicroservice
      dockerfile: Dockerfile
    networks:
      - prisma-network
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - ConnectionStrings__Supabase=${DATABASE_URL}
      - Supabase__Url=${SUPABASE_URL}

  questao-api:
    build:
      context: ./backend/QuestaoMicroservice
      dockerfile: Dockerfile
    networks:
      - prisma-network
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - ConnectionStrings__Supabase=${DATABASE_URL}
      - Supabase__Url=${SUPABASE_URL}

  ia-service:
    build:
      context: ./ia
      dockerfile: Dockerfile
    networks:
      - prisma-network
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - OLLAMA_MODEL=llama3.2:3b
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dados-api:
    build:
      context: ./backend/DadosMicroservice
      dockerfile: Dockerfile
    networks:
      - prisma-network
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - ConnectionStrings__Supabase=${DATABASE_URL}
      - Supabase__Url=${SUPABASE_URL}
networks:
  prisma-network:
    driver: bridge

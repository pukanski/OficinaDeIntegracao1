<main class="flex-1 flex flex-col h-screen overflow-y-auto p-8">
    <div class="max-w-5xl mx-auto w-full">
        <h1 class="text-2xl font-bold text-slate-800">Meus Exercícios</h1>
        <p class="text-slate-500 text-sm mt-1 mb-8">Listas atribuídas à sua turma</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div *ngFor="let lista of listas"
                class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm flex flex-col justify-between hover:border-blue-300 transition-colors">
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <span class="bg-blue-50 text-blue-700 text-xs font-bold px-2 py-1 rounded">{{ lista.materia
                            }}</span>
                        <span [ngClass]="lista.status === 'Pendente' ? 'text-yellow-600' : 'text-blue-600'"
                            class="text-xs font-bold">{{ lista.status }}</span>
                    </div>
                    <h2 class="text-lg font-bold text-slate-800 mb-2">{{ lista.titulo }}</h2>
                    <p class="text-sm text-slate-500 mb-4">Prazo: {{ lista.prazo | date:'dd/MM/yyyy' }} • {{
                        lista.qtdQuestoes }} questões</p>
                </div>
                <button (click)="iniciarResolucao(lista.id)"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition-colors">
                    {{ lista.status === 'Pendente' ? 'Iniciar' : 'Continuar' }}
                </button>
            </div>
        </div>
    </div>
</main>

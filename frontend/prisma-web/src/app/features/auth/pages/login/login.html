<div class="min-h-screen bg-slate-800 flex items-center justify-center p-4 font-sans">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">

    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 bg-slate-800 text-white rounded-xl flex items-center justify-center text-2xl font-bold mb-4 shadow-md">P</div>
      <h1 class="text-2xl font-bold text-slate-800">Prisma</h1>
      <p class="text-sm text-slate-500 mt-1 text-center">Plataforma de inteligência de dados educacionais</p>
    </div>

    <!-- Perfil -->
    <div class="flex bg-slate-100 p-1 rounded-lg mb-6">
      <button type="button"
        [ngClass]="perfilSelecionado === 'professor' ? 'bg-slate-800 shadow text-white' : 'text-slate-500 hover:text-slate-700'"
        class="flex-1 py-2 text-sm font-medium rounded-md transition-all"
        (click)="alterarPerfil('professor')">Professor</button>
      <button type="button"
        [ngClass]="perfilSelecionado === 'aluno' ? 'bg-slate-800 shadow text-white' : 'text-slate-500 hover:text-slate-700'"
        class="flex-1 py-2 text-sm font-medium rounded-md transition-all"
        (click)="alterarPerfil('aluno')">Aluno</button>
      <button type="button"
        [ngClass]="perfilSelecionado === 'admin' ? 'bg-slate-800 shadow text-white' : 'text-slate-500 hover:text-slate-700'"
        class="flex-1 py-2 text-sm font-medium rounded-md transition-all"
        (click)="alterarPerfil('admin')">Admin</button>
    </div>

    <div *ngIf="erro" class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">{{ erro }}</div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">E-mail</label>
        <input type="email" formControlName="email" placeholder="seu@email.com"
          class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-500 focus:border-slate-500 outline-none transition-all text-slate-800"
          [ngClass]="{'border-red-400': loginForm.get('email')?.touched && loginForm.get('email')?.invalid}">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Senha</label>
        <input type="password" formControlName="senha" placeholder="••••••••"
          class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-500 focus:border-slate-500 outline-none transition-all text-slate-800"
          [ngClass]="{'border-red-400': loginForm.get('senha')?.touched && loginForm.get('senha')?.invalid}">
      </div>

      <div class="flex justify-end">
        <button type="button" (click)="abrirEsqueciSenha()"
          class="text-sm font-medium text-slate-500 hover:text-slate-800 hover:underline transition-colors">
          Esqueci a senha
        </button>
      </div>

      <button type="submit" [disabled]="carregando || loginForm.invalid"
        class="w-full bg-slate-800 hover:bg-slate-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-md">
        {{ carregando ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>

<!-- Modal Esqueci a Senha -->
<div *ngIf="modalSenhaAberto"
  class="fixed inset-0 bg-slate-900 bg-opacity-60 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
    <h3 class="text-lg font-bold text-slate-800 mb-1">Redefinir Senha</h3>
    <p class="text-sm text-slate-500 mb-4">Informe seu e-mail e enviaremos um link para redefinir a senha.</p>

    <div *ngIf="msgReset" class="mb-3 p-3 rounded-lg text-sm font-medium"
      [class.bg-green-50]="!erroReset" [class.text-green-700]="!erroReset"
      [class.bg-red-50]="erroReset" [class.text-red-700]="erroReset">
      {{ msgReset }}
    </div>

    <input type="email" [(ngModel)]="emailReset" placeholder="seu@email.com"
      class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-500 outline-none text-sm mb-4 text-slate-800">

    <div class="flex gap-3">
      <button (click)="fecharEsqueciSenha()"
        class="flex-1 px-4 py-2.5 text-slate-600 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors text-sm font-medium">
        Cancelar
      </button>
      <button (click)="enviarResetSenha()" [disabled]="enviandoReset || !emailReset"
        class="flex-1 px-4 py-2.5 bg-slate-800 hover:bg-slate-700 text-white rounded-lg transition-colors text-sm font-bold disabled:opacity-50">
        {{ enviandoReset ? 'Enviando...' : 'Enviar Link' }}
      </button>
    </div>
  </div>
</div>

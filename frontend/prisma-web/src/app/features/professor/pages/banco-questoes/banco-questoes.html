<div class="mb-6">
  <h1 class="text-2xl font-bold text-slate-800">Banco de Questões</h1>
  <p class="text-slate-500 text-sm mt-1">Busque e selecione questões</p>
</div>

<div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm mb-6">
  <div class="mb-4">
    <label class="block text-sm font-semibold text-slate-700 mb-2">Buscar</label>
    <div class="relative">
      <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">🔍</span>
      <input type="text" [(ngModel)]="termoBusca" placeholder="Digite o título ou conteúdo da questão..." class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">Disciplina</label>
      <select [(ngModel)]="filtroDisciplina" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-slate-600 bg-white">
        <option value="Todas">Todas</option>
        <option *ngFor="let disc of disciplinasUnicas" [value]="disc">{{ disc }}</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">Macro Área</label>
      <select [(ngModel)]="filtroMacroArea" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-slate-600 bg-white">
        <option value="Todas">Todas</option>
        <option *ngFor="let macro of macroAreasUnicas" [value]="macro">{{ macro }}</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">Micro Área</label>
      <input type="text" [(ngModel)]="filtroMicroArea" placeholder="Buscar..." class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
    </div>
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">Dificuldade</label>
      <select [(ngModel)]="filtroDificuldade" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-slate-600 bg-white">
        <option value="Todas">Todas</option>
        <option value="1">1 - Muito Fácil</option>
        <option value="2">2 - Fácil</option>
        <option value="3">3 - Média</option>
        <option value="4">4 - Difícil</option>
        <option value="5">5 - Muito Difícil</option>
      </select>
    </div>
  </div>
</div>

<p class="text-sm font-bold text-slate-700 mb-4">{{ questoesFiltradas.length }} questão(ões) encontrada(s)</p>

<div class="space-y-4">
  <div *ngFor="let questao of questoesFiltradas" class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm flex items-start hover:border-blue-300 transition-colors">
    
    <input type="checkbox" (change)="toggleSelecao(questao.id)" class="mt-1 mr-4 w-5 h-5 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500 cursor-pointer">
    
    <div class="flex-1">
      <h3 class="font-bold text-slate-800 text-lg mb-2">{{ questao.enunciado }}</h3>
      
      <div class="flex flex-wrap items-center gap-2 mb-3">
        <span class="px-2 py-1 bg-blue-50 text-blue-600 text-xs font-semibold rounded">{{ questao.disciplina }}</span>
        <span class="px-2 py-1 bg-slate-100 text-slate-600 text-xs font-semibold rounded">{{ questao.macroArea }}</span>
        <span class="px-2 py-1 bg-slate-100 text-slate-600 text-xs font-semibold rounded">{{ questao.microArea }}</span>
      </div>

      <div class="flex items-center text-sm text-slate-500">
        <div class="flex mr-2">
          <span *ngFor="let ativa of getDificuldadeArray(questao.dificuldade)" 
                [ngClass]="ativa ? 'text-yellow-400' : 'text-slate-300'" class="text-xs">
            ●
          </span>
        </div>
        Dificuldade: {{ questao.dificuldade }}/5
      </div>
    </div>
  </div>
</div>
